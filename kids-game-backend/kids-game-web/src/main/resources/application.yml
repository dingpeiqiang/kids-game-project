server:
  port: 8080

spring:
  application:
    name: kids-game-platform

  profiles:
    active: dev

  # MySQL 数据库配置
  datasource:
    url: jdbc:mysql://106.54.7.205:3306/kidgame?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: kidsgame
    password: Kidsgame2026!Secure
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP 连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  # 自动执行初始化脚本（已禁用，避免重复插入数据）
  # sql:
  #   init:
  #     mode: always
  #     schema-locations: classpath:schema.sql
  #     data-locations: classpath:data.sql

  # Redis 配置
  data:
    redis:
      host: 106.54.7.205
      port: 6379
      password: Kidsgame2026!Redis
      database: 0
      timeout: 30000ms
      lettuce:
        pool:
          enabled: true
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
        shutdown-timeout: 100ms

# JWT 安全配置
security:
  jwt:
    secret: ${JWT_SECRET:kids-game-platform-secret-key-for-jwt-token-generation-2024}
    expiration: 604800000  # 7 天
    refresh-expiration: 2592000000  # 30 天

# MyBatis-Plus 配置
mybatis-plus:
  # 实体包路径
  type-aliases-package: com.kidgame.dao.entity
  # Mapper XML 路径
  mapper-locations: classpath*:mapper/**/*.xml
  # 全局配置
  global-config:
    # 禁用 MyBatis-Plus 的 DDL 自动运行（使用 Spring Boot 的 sql.init）
    ddl-auto: false
    db-config:
      # 主键类型（自增）
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  # 配置日志
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志配置
logging:
  level:
    com.kidgame: debug
    com.baomidou.mybatisplus: debug
    # 降低异常处理器的日志级别，避免打印 WebSocket 资源未找到的错误
    com.kidgame.common.handler.GlobalExceptionHandler: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 应用配置
kidgame:
  game:
    # 全局游戏时长限制（分钟）
    time-limit: 30
    # 适龄规则配置
    age-rules:
      4: [puzzle, educational]
      6: [puzzle, casual, educational]
      8: [puzzle, casual, adventure, educational]
  # 家长管控配置
  parent:
    # 默认PIN码
    default-pin: "0000"
    # 时长警告阈值（分钟）
    warning-thresholds: [5, 10, 15]
  # 疲劳点配置
  fatigue-points:
    # 初始点数
    initial: 10
